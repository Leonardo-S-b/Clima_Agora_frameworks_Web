server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Healthcheck simples para o container de frontend.
    location = /health {
        add_header Content-Type application/json;
        return 200 '{"ok":true,"service":"clima-agora-web"}';
    }

    # SPA fallback para rotas do Flutter Web.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo para assets estáticos gerados pelo build.
    location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|svg|ico|json|webp|ttf|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}