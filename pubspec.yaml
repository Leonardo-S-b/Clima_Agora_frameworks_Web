publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  geolocator: ^14.0.2
  shared_preferences: ^2.5.5
  flutter_animate: ^4.5.0
